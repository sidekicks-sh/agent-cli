services:
  sidekick:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: sidekick:local
    env_file:
      - .env.sidekick
    environment:
      GH_CONFIG_DIR: /home/sidekick/.config/gh
      CODEX_HOME: /home/sidekick/.codex
      SIDEKICK_PID_FILE: /var/run/sidekick/sidekick.pid
      SIDEKICK_LOG_FILE: /var/log/sidekick/sidekick.log
    secrets:
      - sidekick_api_token
      - gh_token
      - github_token
      - openai_api_key
      - openrouter_api_key
      - openrouter_model
      - anthropic_api_key
      - opencode_api_key
    volumes:
      - ./repos:/work/repos
      - ${HOME}/.ssh:/home/sidekick/.ssh:ro
      - ${HOME}/.config/gh:/home/sidekick/.config/gh:ro
      - ${HOME}/.codex:/home/sidekick/.codex
      - ./logs:/var/log/sidekick
    healthcheck:
      test: [ "CMD", "/opt/sidekick/sidekick", "status" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

secrets:
  sidekick_api_token:
    file: ./secrets/sidekick_api_token
  gh_token:
    file: ./secrets/gh_token
  github_token:
    file: ./secrets/github_token
  openai_api_key:
    file: ./secrets/openai_api_key
  openrouter_api_key:
    file: ./secrets/openrouter_api_key
  openrouter_model:
    file: ./secrets/openrouter_model
  anthropic_api_key:
    file: ./secrets/anthropic_api_key
  opencode_api_key:
    file: ./secrets/opencode_api_key
